description: >-
  Brink's is a global leader in secure cash management, armored transport, ATM
  services, and financial security solutions. The company serves retail, restaurant,
  financial institutions, and entertainment businesses with its Total Cash Management
  platform, combining hardware, software, and logistics services. Brink's digital
  customer portal 24SEVEN ACCESS enables businesses to track cash deposits, order
  change, and manage operations via mobile and desktop interfaces. Additional products
  include the Brink's Armored Account payment processing service, Brink's Money
  paycard for employee payments, and RetailBox point-of-sale cash management.

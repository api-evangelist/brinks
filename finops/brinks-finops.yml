description: 'FOCUS-aligned FinOps for Brink''s: bundled commercial contract covering 24SEVEN ACCESS
  portal, Armored Account, RetailBox, and Brink''s Money paycard services with armored logistics and
  hardware. Software and API access are not separately metered; spend is dominated by per-pickup and
  per-location service fees set in the master services agreement.'
sources:
  - https://www.brinks.com/
notes: API access is included with contracted cash management services; no public per-API price.
billingModel:
  pricingCategory: Service Contract
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Brink's
  ServiceCategory: Cash Management & Logistics
  ProviderName: Brink's
  PublisherName: The Brink's Company
  InvoiceIssuerName: The Brink's Company
  BillingCurrency: USD
  PricingCategory: Other
  PricingUnit: service-contract
meters:
  - name: service_contract_month
    description: Monthly contracted service fee covering portal access, software, and base logistics.
    unit: month
    aggregation: sum
    dimensions:
      - location
      - product_line
  - name: pickups
    description: Armored pickup events per location.
    unit: event
    aggregation: sum
    dimensions:
      - location
      - frequency_band
  - name: deposits_processed
    description: Cash deposits processed through 24SEVEN ACCESS / Armored Account.
    unit: deposit
    aggregation: sum
    dimensions:
      - location
  - name: paycard_loads
    description: Brink's Money paycard loads.
    unit: load
    aggregation: sum
    dimensions:
      - employer
principles:
  - name: Visibility
    description: Use 24SEVEN ACCESS to track deposits, pickups, and change orders by location; reconcile
      against monthly invoices and the master services agreement.
  - name: Allocation
    description: Allocate cash management spend by store / location to product lines, regions, or business
      units that own the cash flow.
  - name: Optimization
    description: Tune pickup frequency to actual deposit volume per location, consolidate stops where
      geography allows, and renegotiate volume-based discounts at renewal.
  - name: Accountability
    description: Designate a treasury / store-operations owner for the Brink's relationship; review pickup
      frequency, dispute discrepancies, and forecast contract renewals against retail growth plans.
maintainers:

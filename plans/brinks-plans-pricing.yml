provider: Brinks
providerId: brinks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cash Management
  - Security
  - ATM Services
  - Financial Services
  - Armored Transport
description: Brink's is a B2B cash management and armored transport provider. Its 24SEVEN ACCESS digital
  portal, Brink's Armored Account, RetailBox, and Brink's Money services are sold under bilateral commercial
  contracts that bundle hardware, software, and logistics services. There is no public, self-service
  API price list; pricing is custom-quoted per customer based on locations, pickup frequency, and cash
  volume.
sources:
  - https://www.brinks.com/
notes: No public API price list. All pricing is contracted on a per-customer basis with hardware, logistics,
  and software bundled. Reconcile against the customer's master services agreement.
plans:
  - id: brinks-enterprise
    name: Enterprise / Contracted Service
    type: enterprise
    description: Custom commercial agreement covering 24SEVEN ACCESS portal, Armored Account, RetailBox,
      Brink's Money paycard, and supporting APIs. Pricing is bundled with cash logistics and hardware.
    entries:
      - label: Service contract
        name: service_contract
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Per-pickup / per-deposit
        name: per_pickup
        type: metered
        metric: event
        limit: -1
        timeFrame: usage
        geo: configurable
        unit: 1
        price: see services agreement
        userMultiplied: false
      - label: API access
        name: api_access
        type: quota
        metric: request
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: included with services
        userMultiplied: false
    elements:
      - name: 24SEVEN ACCESS Portal
      - name: Brink's Armored Account
      - name: RetailBox
      - name: Brink's Money Paycard
      - name: Total Cash Management Platform

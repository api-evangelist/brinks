specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Brinks
providerId: brinks
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cash Management
  - Security
  - ATM Services
  - Financial Services
  - Rate Limiting
description: Brink's does not publish API rate limits on a public developer portal. Access to the 24SEVEN
  ACCESS portal and supporting APIs is granted to contracted customers and integration partners; rate-limit
  terms are conveyed in the service agreement and technical onboarding documents.
sources:
  - https://www.brinks.com/
notes: Rate limits are not publicly published; values are partner / contract specific.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: 24SEVEN ACCESS / contracted APIs
    scope: contract
    metric: varies
    limit: 'see contract / onboarding documentation'
    notes: Per-customer values bound to the master services agreement.
policies:
  - name: Backoff Strategy
    description: Apply exponential backoff with jitter on 429 / 503 responses; honor Retry-After when
      present.
  - name: Contract-Bound Capacity
    description: Effective request capacity is set by the customer contract and partner onboarding documents,
      not via a public tier page.
  - name: Fair Use
    description: Sustained traffic that materially impacts shared infrastructure may trigger throttling
      regardless of contract.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
